<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Storé — Modern Shop</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="nav__logo">Storé</div>
    <nav class="nav__links">
      <a href="#products">Shop</a>
      <a href="#about">About</a>
    </nav>
    <button class="nav__cart-btn" onclick="toggleCart()">
      <span class="cart-icon">⊕</span>
      Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero__eyebrow">New collection — 2025</div>
    <h1 class="hero__title">Curated things<br/><em>worth having.</em></h1>
    <p class="hero__sub">A small, considered shop. No noise, no flash sales — just good objects.</p>
    <a href="#products" class="btn btn--primary">Browse the shop</a>
    <div class="hero__grain"></div>
  </section>

  <!-- PRODUCTS -->
  <section class="products" id="products">
    <div class="products__header">
      <h2 class="products__title">All products</h2>
      <div class="products__filters">
        <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
        <button class="filter-btn" onclick="filterProducts('under50', this)">Under ₹50</button>
        <button class="filter-btn" onclick="filterProducts('instock', this)">In stock</button>
      </div>
    </div>
    <div class="product-grid" id="product-grid">
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
      <div class="product-skeleton"></div>
    </div>
    <p class="error-msg" id="error-msg" style="display:none">
      Could not reach the API. Make sure the Flask server is running.
    </p>
  </section>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer__header">
      <h3>Your cart</h3>
      <button class="cart-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-drawer__items" id="cart-items">
      <p class="cart-empty">Your cart is empty.</p>
    </div>
    <div class="cart-drawer__footer" id="cart-footer" style="display:none">
      <div class="cart-total">
        Total <span id="cart-total">₹0.00</span>
      </div>
      <button class="btn btn--primary btn--full" onclick="checkout()">Checkout</button>
    </div>
  </aside>

  <!-- ORDER TOAST -->
  <div class="toast" id="toast"></div>

  <script src="main.js"></script>
</body>
</html>
